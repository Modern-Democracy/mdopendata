<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: #f5efe1; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; }
  .sw { border-radius: 4px; border: 1px solid rgba(26,22,18,0.08); overflow: hidden; }
  .chip { height: 60px; }
  .meta { padding: 8px 10px; background: var(--paper-2); border-top: 1px solid var(--border-hair); }
  .name { font-family: var(--font-ui); font-weight: 600; font-size: 11px; color: var(--fg-1); letter-spacing: -0.005em; }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); margin-top: 2px; }
</style></head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--paper)"></div><div class="meta"><div class="name">paper</div><div class="hex">#f5efe1</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-2)"></div><div class="meta"><div class="name">paper-2</div><div class="hex">#ede5d1</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-3)"></div><div class="meta"><div class="name">paper-3</div><div class="hex">#e2d8bf</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-edge)"></div><div class="meta"><div class="name">paper-edge</div><div class="hex">#d4c8a8</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-4)"></div><div class="meta"><div class="name">ink-4</div><div class="hex">#938a73</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-3)"></div><div class="meta"><div class="name">ink-3</div><div class="hex">#6b6350</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-2)"></div><div class="meta"><div class="name">ink-2</div><div class="hex">#3b3429</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink)"></div><div class="meta"><div class="name">ink</div><div class="hex">#1a1612</div></div></div>
  </div>
</body></html>
