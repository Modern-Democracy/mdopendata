<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--paper); }
  .stack { display: grid; gap: 14px; }
  .row { display: grid; grid-template-columns: 88px 1fr; align-items: baseline; gap: 16px; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .display { font-family: var(--font-display); font-variation-settings: "opsz" 144; font-weight: 500; font-size: 64px; line-height: 0.95; letter-spacing: -0.025em; color: var(--ink); }
  .h1 { font-family: var(--font-display); font-variation-settings: "opsz" 72; font-weight: 500; font-size: 40px; line-height: 1.02; letter-spacing: -0.015em; color: var(--ink); }
  .h2 { font-family: var(--font-display); font-variation-settings: "opsz" 48; font-weight: 500; font-size: 28px; line-height: 1.1; color: var(--ink); }
  .h3 { font-family: var(--font-display); font-variation-settings: "opsz" 24; font-weight: 500; font-size: 20px; line-height: 1.2; color: var(--ink); }
</style></head>
<body>
  <div class="stack">
    <div class="row"><span class="tag">display</span><div class="display">Charlottetown</div></div>
    <div class="row"><span class="tag">h1</span><div class="h1">Zoning &amp; Development Bylaw</div></div>
    <div class="row"><span class="tag">h2</span><div class="h2">Single Detached Residential Zone</div></div>
    <div class="row"><span class="tag">h3</span><div class="h3">9.2 — Regulations for permitted uses</div></div>
  </div>
</body></html>
