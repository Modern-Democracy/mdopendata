<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--paper); }
  table { width: 100%; border-collapse: collapse; font-family: var(--font-ui); font-size: 13px; }
  thead th { text-align: left; font-family: var(--font-ui); font-weight: 600; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-3); border-bottom: 2px solid var(--ink); padding: 10px 12px; }
  tbody td { border-bottom: 1px solid var(--border-hair); padding: 12px; color: var(--fg-2); vertical-align: middle; }
  tbody tr:hover td { background: var(--paper-2); }
  .req { color: var(--ink); font-weight: 500; }
  .val { font-family: var(--font-mono); font-size: 13px; color: var(--ink); }
  .cite { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
</style></head>
<body>
  <table>
    <thead>
      <tr><th>Requirement</th><th>Interior lot</th><th>Corner lot</th><th>Clause</th></tr>
    </thead>
    <tbody>
      <tr><td class="req">Lot area (minimum)</td><td class="val">540 m²</td><td class="val">686 m²</td><td class="cite">9.2.1</td></tr>
      <tr><td class="req">Lot frontage (minimum)</td><td class="val">18.0 m</td><td class="val">22.0 m</td><td class="cite">9.2.2</td></tr>
      <tr><td class="req">Front yard (minimum)</td><td class="val">6.0 m</td><td class="val">6.0 m</td><td class="cite">9.2.3</td></tr>
      <tr><td class="req">Rear yard (minimum)</td><td class="val">7.5 m</td><td class="val">7.5 m</td><td class="cite">9.2.4</td></tr>
      <tr><td class="req">Building height (maximum)</td><td class="val">10.5 m</td><td class="val">10.5 m</td><td class="cite">9.2.5</td></tr>
    </tbody>
  </table>
</body></html>
