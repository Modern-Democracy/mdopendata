<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--paper); display: grid; gap: 16px; }
  .row { display: grid; grid-template-columns: 120px 1fr; align-items: center; gap: 16px; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .zone { font-family: var(--font-mono); font-weight: 600; font-size: 22px; letter-spacing: 0.02em; color: var(--ink); }
  .clause { font-family: var(--font-mono); font-weight: 500; font-size: 15px; color: var(--fg-2); }
  .num { font-family: var(--font-mono); font-weight: 500; font-size: 17px; color: var(--ink); }
  .num small { font-family: var(--font-ui); font-size: 12px; color: var(--fg-3); font-weight: 400; margin-left: 6px; }
  .pid { font-family: var(--font-mono); font-size: 14px; color: var(--fg-2); background: var(--paper-2); padding: 3px 8px; border-radius: 2px; border: 1px solid var(--border-hair); display: inline-block; }
</style></head>
<body>
  <div class="row"><span class="tag">zone-code</span><span class="zone">R-1L</span></div>
  <div class="row"><span class="tag">clause</span><span class="clause">§ 9.1.1 · 20(1)(a.1) · 34B38</span></div>
  <div class="row"><span class="tag">numeric</span><span class="num">540 m² <small>(5,812.5 sq ft)</small></span></div>
  <div class="row"><span class="tag">pid</span><span class="pid">PID 384712</span></div>
</body></html>
