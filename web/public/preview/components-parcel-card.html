<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--paper); }
  .card { background: var(--paper-2); border: 1px solid var(--border-hair); border-radius: 6px; padding: 20px; display: grid; grid-template-columns: 1fr auto; gap: 14px; max-width: 640px; }
  .addr { font-family: var(--font-display); font-variation-settings: "opsz" 48; font-weight: 500; font-size: 26px; line-height: 1.05; letter-spacing: -0.015em; color: var(--ink); margin: 0 0 4px; }
  .meta { font-family: var(--font-mono); font-size: 12px; color: var(--fg-3); display: flex; gap: 10px; }
  .meta span:not(:last-child)::after { content: '·'; margin-left: 10px; color: var(--ink-4); }
  .zone-side { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .zone-big { font-family: var(--font-mono); font-weight: 600; font-size: 22px; color: var(--ink); background: var(--zone-residential); padding: 6px 12px; border-radius: 4px; border: 1px solid rgba(26,22,18,0.1); letter-spacing: 0.02em; }
  .zone-name { font-family: var(--font-ui); font-size: 12px; color: var(--fg-3); }
  .rules { margin-top: 8px; padding-top: 14px; border-top: 1px solid var(--border-hair); display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; grid-column: 1 / -1; }
  .rule { display: grid; gap: 2px; }
  .rule .k { font-family: var(--font-ui); font-size: 10.5px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-3); }
  .rule .v { font-family: var(--font-mono); font-size: 15px; color: var(--ink); }
</style></head>
<body>
  <div class="card">
    <div>
      <h3 class="addr">165 Richmond Street</h3>
      <div class="meta"><span>PID 384712</span><span>Ward 2 — Brighton</span><span>0.08 ha</span></div>
    </div>
    <div class="zone-side">
      <span class="zone-big">R-1L</span>
      <span class="zone-name">Single-detached residential</span>
    </div>
    <div class="rules">
      <div class="rule"><span class="k">Lot area min</span><span class="v">540 m²</span></div>
      <div class="rule"><span class="k">Height max</span><span class="v">10.5 m</span></div>
      <div class="rule"><span class="k">Front yard</span><span class="v">6.0 m</span></div>
      <div class="rule"><span class="k">Parking</span><span class="v">1 / unit</span></div>
    </div>
  </div>
</body></html>
