<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--paper); }
  .clause { background: var(--paper-2); border-left: 3px solid var(--forest); padding: 14px 18px; border-radius: 0 4px 4px 0; max-width: 640px; }
  .head { display: flex; gap: 10px; align-items: baseline; margin-bottom: 6px; }
  .label { font-family: var(--font-mono); font-weight: 600; font-size: 13px; color: var(--forest-ink); }
  .title { font-family: var(--font-ui); font-weight: 600; font-size: 13px; color: var(--fg-2); letter-spacing: 0.02em; text-transform: uppercase; }
  .text { font-family: var(--font-display); font-variation-settings: "opsz" 14; font-size: 16px; line-height: 1.45; color: var(--ink); margin: 0 0 10px; }
  .cite { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); display: flex; gap: 8px; align-items: center; }
  .cite a { color: var(--harbour-ink); text-decoration: none; border-bottom: 1px solid rgba(43,93,117,0.4); }
  .divider { color: var(--ink-4); }
</style></head>
<body>
  <div class="clause">
    <div class="head">
      <span class="label">§ 9.2.1</span>
      <span class="title">Lot area — minimum</span>
    </div>
    <p class="text">The minimum lot area for a single-detached dwelling on an interior lot is 540 m² (5,812.5 sq ft); on a corner lot, 686 m² (7,384 sq ft).</p>
    <div class="cite">
      <a href="#">charlottetown-zoning-bylaw.pdf</a>
      <span class="divider">·</span>
      <span>page 61</span>
      <span class="divider">·</span>
      <span>PH-ZD.2 rev 049</span>
    </div>
  </div>
</body></html>
