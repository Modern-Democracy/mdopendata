<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--paper); display: grid; grid-template-columns: auto 1fr; gap: 28px; align-items: center; }
  .mono { display: grid; gap: 8px; justify-items: center; }
  .mono img { width: 88px; height: 88px; }
  .mono .cap { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); }
  .wm { display: grid; gap: 14px; }
  .wm img { height: 36px; width: auto; }
  .wm .sub img { height: 46px; }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 4px; }
</style></head>
<body>
  <div class="mono">
    <img src="../assets/logo-monogram.svg" alt="MD monogram" />
    <span class="cap">Monogram · 1×</span>
  </div>
  <div class="wm">
    <div>
      <div class="label">Parent wordmark</div>
      <img src="../assets/logo-wordmark.svg" alt="Modern Democracy" />
    </div>
    <div class="sub">
      <div class="label">mdopendata lockup</div>
      <img src="../assets/logo-mdopendata.svg" alt="mdopendata" />
    </div>
  </div>
</body></html>
