<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zoning Comparison - Modern Democracy</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../parcel-lookup/styles.css">
<style>
  .compare-shell { max-width: 1180px; margin: 0 auto; padding: 34px 24px 56px; }
  .page-head { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 18px; align-items: end; margin-bottom: 24px; }
  .eyebrow { font-family: var(--font-ui); font-weight: 600; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 10px; }
  .page-head h1 { font-family: var(--font-display); font-variation-settings: "opsz" 72; font-weight: 500; font-size: 42px; line-height: 1.02; margin: 0 0 8px; color: var(--ink); }
  .page-head p { font-family: var(--font-ui); font-size: 14px; color: var(--fg-3); line-height: 1.45; margin: 0; max-width: 72ch; }
  .head-actions { display: flex; gap: 8px; align-items: center; }
  .summary-bar { background: var(--paper-2); border: 1px solid var(--border-hair); border-radius: 6px; padding: 16px 18px; margin-bottom: 20px; display: flex; gap: 28px; align-items: center; flex-wrap: wrap; }
  .summary-stat .n { font-family: var(--font-display); font-variation-settings: "opsz" 72; font-weight: 500; font-size: 27px; line-height: 1; color: var(--ink); }
  .summary-stat .l { font-family: var(--font-ui); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-3); margin-top: 4px; }
  .summary-stat.changed .n { color: var(--ochre-ink); }
  .summary-stat.pending .n { color: var(--brick-ink); }
  .compare-grid { display: grid; grid-template-columns: 1fr 190px 1fr; border: 1px solid var(--border-hair); border-radius: 6px; overflow: hidden; background: var(--paper); }
  .col-head { display: flex; align-items: center; gap: 10px; padding: 18px 20px; border-bottom: 1px solid var(--border-hair); background: var(--paper-2); }
  .col-head.current { border-right: 1px solid var(--border-hair); }
  .col-head.label { justify-content: center; background: var(--paper-3); border-right: 1px solid var(--border-hair); }
  .col-head .dot { width: 10px; height: 10px; border-radius: 50%; }
  .col-head .name { font-family: var(--font-ui); font-weight: 600; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink); }
  .col-head .sub { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-left: auto; }
  .diff-cell { min-height: 48px; padding: 13px 16px; border-bottom: 1px solid var(--border-hair); font-family: var(--font-ui); font-size: 14px; color: var(--fg-2); display: flex; align-items: center; gap: 8px; }
  .diff-cell.current { justify-content: flex-end; text-align: right; border-right: 1px solid var(--border-hair); }
  .diff-cell.label { justify-content: center; text-align: center; background: var(--paper-3); color: var(--ink); font-weight: 500; font-size: 12.5px; border-right: 1px solid var(--border-hair); }
  .diff-cell.draft { justify-content: flex-start; }
  .diff-cell.empty { color: var(--fg-3); opacity: 0.65; }
  .value { font-family: var(--font-mono); font-weight: 500; color: var(--ink); }
  .marker { font-family: var(--font-mono); font-size: 10.5px; padding: 2px 6px; border-radius: 2px; letter-spacing: 0.05em; white-space: nowrap; }
  .marker.changed { background: var(--ochre-wash); color: var(--ochre-ink); }
  .marker.same, .marker.source { background: var(--paper-2); color: var(--fg-3); }
  .marker.pending { background: var(--brick-wash); color: var(--brick-ink); }
  .citation-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 22px; }
  .citation-card { border: 1px solid var(--border-hair); border-radius: 6px; background: var(--paper-2); padding: 16px; }
  .citation-card h2 { font-family: var(--font-ui); font-weight: 600; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; margin: 0 0 12px; color: var(--fg-3); }
  .citation-list { display: grid; gap: 10px; }
  .citation-item { padding-bottom: 10px; border-bottom: 1px solid var(--border-hair); font-family: var(--font-ui); font-size: 13px; color: var(--fg-2); line-height: 1.35; }
  .citation-item:last-child { border-bottom: 0; padding-bottom: 0; }
  .citation-item .title { color: var(--ink); font-weight: 500; }
  .citation-item .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-top: 3px; }
  .status-card { border: 1px solid var(--border-hair); border-radius: 6px; background: var(--paper-2); padding: 18px; font-family: var(--font-ui); font-size: 14px; color: var(--fg-3); }
  @media (max-width: 760px) {
    .page-head { grid-template-columns: 1fr; }
    .head-actions { justify-content: stretch; }
    .head-actions .btn { flex: 1; justify-content: center; }
    .compare-grid { grid-template-columns: 1fr; }
    .col-head.label, .diff-cell.label { display: none; }
    .diff-cell.current, .diff-cell.draft { justify-content: flex-start; text-align: left; border-right: 0; }
    .diff-cell.current::before { content: attr(data-label) " current"; font-family: var(--font-ui); font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; margin-right: auto; }
    .diff-cell.draft::before { content: attr(data-label) " draft"; font-family: var(--font-ui); font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; margin-right: auto; }
    .citation-grid { grid-template-columns: 1fr; }
  }
</style>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useEffect, useMemo, useState } = React;

function formatValue(value, label) {
  if (value === null || value === undefined || value === '') {
    return 'pending';
  }
  if (label.toLowerCase().includes('overlap') && Number.isFinite(Number(value))) {
    return `${Number(value).toFixed(0)} m2`;
  }
  return String(value);
}

function markerText(status, side) {
  if (status === 'same') return 'SAME';
  if (status === 'pending') return 'PENDING';
  if (status === 'source') return 'SOURCE';
  return side === 'current' ? 'WAS' : 'NOW';
}

function Header() {
  return (
    <header className="app-header">
      <img src="../../assets/logo-island-needle.svg" alt="Modern Democracy" className="wm" />
      <nav>
        <a href="/parcel-lookup">Parcel lookup</a>
        <a className="active" href="/zoning-comparison">Compare bylaws</a>
        <a href="/city-view">Map</a>
      </nav>
    </header>
  );
}

function CitationList({ title, sections }) {
  return (
    <section className="citation-card">
      <h2>{title}</h2>
      <div className="citation-list">
        {sections.length === 0 && <div className="citation-item">Zone-section citations pending for this parcel zone.</div>}
        {sections.map((section, index) => (
          <div className="citation-item" key={`${section.sectionId}-${index}`}>
            <div className="title">{section.label} {section.title}</div>
            <div className="meta">{section.filePath || 'source path pending'}</div>
            <div className="meta">Bylaw page {section.citations?.bylaw_page_start || 'pending'}</div>
          </div>
        ))}
      </div>
    </section>
  );
}

function ComparisonRows({ rows }) {
  return (
    <div className="compare-grid">
      <div className="col-head current"><span className="dot" style={{background:'var(--brick)'}}></span><span className="name">Current bylaw</span><span className="sub">in force</span></div>
      <div className="col-head label"><span className="name">Field</span></div>
      <div className="col-head draft"><span className="dot" style={{background:'var(--ochre)'}}></span><span className="name">Draft bylaw</span><span className="sub">2026 draft</span></div>
      {rows.map((row, index) => (
        <React.Fragment key={`${row.label}-${index}`}>
          <div className={`diff-cell current ${row.current == null ? 'empty' : ''}`} data-label={row.label}>
            <span className="value">{formatValue(row.current, row.label)}</span>
            <span className={`marker ${row.status}`}>{markerText(row.status, 'current')}</span>
          </div>
          <div className="diff-cell label">{row.label}</div>
          <div className={`diff-cell draft ${row.draft == null ? 'empty' : ''}`} data-label={row.label}>
            <span className={`marker ${row.status}`}>{markerText(row.status, 'draft')}</span>
            <span className="value">{formatValue(row.draft, row.label)}</span>
          </div>
        </React.Fragment>
      ))}
    </div>
  );
}

function App() {
  const params = new URLSearchParams(window.location.search);
  const pid = params.get('pid') || '';
  const [comparison, setComparison] = useState(null);
  const [status, setStatus] = useState(pid ? 'Loading zoning comparison.' : 'No PID was supplied. Start from parcel lookup or city view.');

  useEffect(() => { lucide.createIcons(); });

  useEffect(() => {
    if (!pid) return;
    let cancelled = false;
    async function loadComparison() {
      try {
        const response = await fetch(`/api/zoning-comparison/${encodeURIComponent(pid)}`);
        if (!response.ok) {
          throw new Error(`Zoning comparison failed with HTTP ${response.status}.`);
        }
        const payload = await response.json();
        if (!cancelled) {
          setComparison(payload);
          setStatus(`Loaded comparison for PID ${payload.pid}.`);
        }
      } catch (error) {
        if (!cancelled) {
          setStatus(error.message || 'Zoning comparison failed.');
        }
      }
    }
    loadComparison();
    return () => { cancelled = true; };
  }, [pid]);

  const counts = useMemo(() => {
    const rows = comparison?.rows || [];
    return {
      changed: rows.filter((row) => row.status === 'changed').length,
      same: rows.filter((row) => row.status === 'same').length,
      pending: rows.filter((row) => row.status === 'pending').length,
      source: rows.filter((row) => row.status === 'source').length,
    };
  }, [comparison]);

  return (
    <div className="app">
      <Header />
      <main className="compare-shell">
        <div className="page-head">
          <div>
            <div className="eyebrow">Comparison</div>
            <h1>{comparison?.address?.label || (pid ? `PID ${pid}` : 'Zoning comparison')}</h1>
            <p>{comparison ? comparison.citations?.note : status}</p>
          </div>
          <div className="head-actions">
            <a className="btn btn-secondary" href="/parcel-lookup"><i data-lucide="search" style={{width:14,height:14}}></i> Lookup</a>
            {pid && <a className="btn btn-primary" href={`/map-explorer?pid=${encodeURIComponent(pid)}`}><i data-lucide="map" style={{width:14,height:14}}></i> Map</a>}
          </div>
        </div>

        {!comparison && <div className="status-card">{status}</div>}
        {comparison && (
          <>
            <div className="summary-bar">
              <div className="summary-stat changed"><div className="n">{counts.changed}</div><div className="l">Changed</div></div>
              <div className="summary-stat"><div className="n">{counts.source}</div><div className="l">Source facts</div></div>
              <div className="summary-stat pending"><div className="n">{counts.pending}</div><div className="l">Pending</div></div>
              <div className="summary-stat"><div className="n" style={{color:'var(--fg-3)'}}>{counts.same}</div><div className="l">Unchanged</div></div>
              <div style={{marginLeft:'auto', fontFamily:'var(--font-mono)', fontSize:12, color:'var(--fg-3)'}}>Resolution: {comparison.resolution?.status || 'pending'}</div>
            </div>
            <ComparisonRows rows={comparison.rows} />
            <div className="citation-grid">
              <CitationList title="Current citations" sections={comparison.citations?.current || []} />
              <CitationList title="Draft citations" sections={comparison.citations?.draft || []} />
            </div>
          </>
        )}
      </main>
      <footer className="app-footer">
        <div className="row">
          <div>Compare current and draft Charlottetown zoning data by parcel.</div>
          <div style={{marginLeft:'auto'}}>Source: <a>github.com/Modern-Democracy/mdopendata</a></div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body></html>
