<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Map Explorer - Modern Democracy</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../../leaflet-theme.css">
<link rel="stylesheet" href="../parcel-lookup/styles.css">
<style>
  html, body, #root { height: 100%; margin: 0; }
  .map-app { display: grid; grid-template-rows: auto 1fr; height: 100vh; background: var(--paper); }
  .map-body { display: grid; grid-template-columns: 290px minmax(0, 1fr) 330px; min-height: 0; overflow: hidden; }
  .map-panel { background: var(--paper-2); border-right: 1px solid var(--border-hair); overflow-y: auto; padding: 18px 18px 40px; }
  .map-panel.right { border-right: 0; border-left: 1px solid var(--border-hair); }
  .panel-title { font-family: var(--font-ui); font-weight: 600; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-3); margin: 0 0 10px; }
  .panel-title:not(:first-child) { margin-top: 22px; }
  .layer { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 4px; cursor: pointer; }
  .layer:hover { background: var(--paper-3); }
  .layer input { accent-color: var(--forest); }
  .layer .sw { width: 16px; height: 16px; border-radius: 3px; border: 1px solid rgba(26,22,18,0.15); }
  .layer .name { font-family: var(--font-ui); font-size: 13px; color: var(--ink); }
  .layer .count { margin-left: auto; font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-3); }
  .map-canvas { position: relative; min-width: 0; min-height: 0; background: var(--paper-3); }
  #map { position: absolute; inset: 0; }
  .search-overlay { position: absolute; top: 16px; left: 16px; z-index: 500; width: min(360px, calc(100% - 32px)); background: var(--paper); border: 1px solid var(--border); border-radius: 4px; box-shadow: var(--shadow-sm); display: flex; align-items: center; padding: 4px 4px 4px 12px; }
  .search-overlay svg { color: var(--fg-3); }
  .search-overlay input { flex: 1; min-width: 0; border: 0; outline: none; padding: 8px 10px; font-family: var(--font-ui); font-size: 14px; background: transparent; color: var(--ink); }
  .map-status { position: absolute; top: 68px; left: 16px; z-index: 500; max-width: min(360px, calc(100% - 32px)); background: rgba(245,239,225,0.96); border: 1px solid var(--border-hair); border-radius: 4px; padding: 8px 10px; font-family: var(--font-ui); font-size: 12.5px; color: var(--fg-3); box-shadow: var(--shadow-sm); }
  .legend { position: absolute; bottom: 18px; right: 18px; z-index: 500; background: rgba(245,239,225,0.96); border: 1px solid var(--border); border-radius: 4px; padding: 12px 14px; min-width: 190px; }
  .legend h4 { font-family: var(--font-ui); font-weight: 600; font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-3); margin: 0 0 8px; }
  .legend .row { display:flex; align-items:center; gap:8px; font-family: var(--font-ui); font-size: 12px; color: var(--ink); padding: 3px 0; }
  .legend .sw { width: 14px; height: 14px; border-radius: 2px; border: 1px solid rgba(26,22,18,0.15); }
  .selected-card, .status-card { background: var(--paper); border: 1px solid var(--border); border-radius: 4px; padding: 14px; margin-bottom: 14px; }
  .selected-card .addr { font-family: var(--font-display); font-variation-settings: "opsz" 48; font-weight: 500; font-size: 20px; line-height: 1.1; color: var(--ink); margin: 0 0 4px; }
  .selected-card .pid, .status-card { font-family: var(--font-mono); font-size: 11.5px; color: var(--fg-3); }
  .selected-card .zchip { font-family: var(--font-mono); font-weight: 600; font-size: 14px; padding: 4px 10px; border-radius: 3px; border: 1px solid rgba(26,22,18,0.12); display:inline-block; margin: 12px 8px 8px 0; }
  .zone-line { font-family: var(--font-ui); font-size: 12.5px; color: var(--fg-3); margin-bottom: 8px; }
  .mini-rules { display: grid; grid-template-columns: 1fr auto; gap: 8px 14px; font-family: var(--font-ui); font-size: 12px; margin-top: 12px; }
  .mini-rules .k { color: var(--fg-3); }
  .mini-rules .v { font-family: var(--font-mono); color: var(--ink); text-align: right; }
  .route-actions { display: grid; gap: 8px; }
  .source-list { display: grid; gap: 8px; font-family: var(--font-ui); font-size: 12.5px; color: var(--fg-2); line-height: 1.35; }
  .source-list .item { padding-bottom: 8px; border-bottom: 1px solid var(--border-hair); }
  .source-list .item:last-child { border-bottom: 0; }
  .source-list .label { color: var(--ink); font-weight: 500; }
  @media (max-width: 980px) {
    .map-body { grid-template-columns: 1fr; grid-template-rows: auto minmax(420px, 1fr) auto; overflow: auto; }
    .map-panel, .map-panel.right { border: 0; border-bottom: 1px solid var(--border-hair); max-height: none; }
    .map-canvas { min-height: 520px; }
  }
</style>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useEffect, useRef, useState } = React;

const CHARLOTTETOWN_CENTER = [46.2382, -63.1311];
const ZONE_COLORS = {
  R: 'var(--zone-residential)',
  C: 'var(--zone-commercial)',
  D: 'var(--zone-mixed)',
  M: 'var(--zone-mixed)',
  I: 'var(--zone-institutional)',
  O: 'var(--zone-openspace)',
  P: 'var(--zone-openspace)',
  W: 'var(--zone-waterfront)',
  H: 'var(--zone-heritage)',
};

function zoneColor(code) {
  const key = String(code || '').trim().charAt(0).toUpperCase();
  return ZONE_COLORS[key] || 'var(--zone-residential)';
}

function formatArea(areaM2) {
  if (!Number.isFinite(Number(areaM2))) {
    return 'pending';
  }
  const hectares = Number(areaM2) / 10000;
  return hectares >= 1 ? `${hectares.toFixed(2)} ha` : `${Number(areaM2).toFixed(0)} m2`;
}

function bboxString(map) {
  const bounds = map.getBounds();
  return [
    bounds.getWest(),
    bounds.getSouth(),
    bounds.getEast(),
    bounds.getNorth(),
  ].map((value) => value.toFixed(6)).join(',');
}

function polygonStyle(color, weight = 1, opacity = 0.42) {
  return { color, weight, opacity: 0.95, fillColor: color, fillOpacity: opacity };
}

function selectedStyle() {
  return { color: '#8f3d2f', weight: 3, opacity: 1, fillColor: '#8f3d2f', fillOpacity: 0.18 };
}

function Header() {
  return (
    <header className="app-header">
      <img src="../../assets/logo-island-needle.svg" alt="Modern Democracy" className="wm" />
      <nav>
        <a href="/parcel-lookup">Parcel lookup</a>
        <a href="/zoning-comparison">Compare bylaws</a>
        <a className="active" href="/city-view">Map</a>
        <a>About</a>
      </nav>
    </header>
  );
}

function LayerToggle({ checked, color, name, count, onChange }) {
  return (
    <label className="layer">
      <input type="checkbox" checked={checked} onChange={(event) => onChange(event.target.checked)} />
      <span className="sw" style={{background: color}}></span>
      <span className="name">{name}</span>
      <span className="count">{count}</span>
    </label>
  );
}

function MapView({ pid, parcel, layers, onLayerCounts, onStatus }) {
  const mapRef = useRef(null);
  const selectedLayerRef = useRef(null);
  const currentLayerRef = useRef(null);
  const draftLayerRef = useRef(null);
  const parcelLayerRef = useRef(null);
  const overlayGroupRef = useRef(null);

  useEffect(() => {
    if (mapRef.current) {
      return;
    }
    const map = L.map('map', { zoomControl: true }).setView(CHARLOTTETOWN_CENTER, 13);
    mapRef.current = map;
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 20,
      attribution: '&copy; OpenStreetMap contributors',
    }).addTo(map);
    L.control.scale({ metric: true, imperial: false }).addTo(map);
    overlayGroupRef.current = L.layerGroup().addTo(map);
    return () => map.remove();
  }, []);

  useEffect(() => {
    const map = mapRef.current;
    if (!map || !parcel?.parcel?.geometry) {
      return;
    }
    if (selectedLayerRef.current) {
      selectedLayerRef.current.remove();
    }
    selectedLayerRef.current = L.geoJSON(parcel.parcel.geometry, {
      style: selectedStyle,
    }).addTo(map);
    const bounds = selectedLayerRef.current.getBounds();
    if (bounds.isValid()) {
      map.fitBounds(bounds.pad(3), { maxZoom: 18 });
    } else if (parcel.parcel.centroid) {
      map.setView([parcel.parcel.centroid.lat, parcel.parcel.centroid.lon], 17);
    }
  }, [parcel?.pid]);

  useEffect(() => {
    const map = mapRef.current;
    if (!map) {
      return;
    }

    let cancelled = false;
    let timer = null;
    async function loadViewport() {
      const bbox = bboxString(map);
      onStatus('Loading visible map layers.');
      try {
        const requests = [];
        if (layers.current) requests.push(['current', fetch(`/api/zoning/current.geojson?bbox=${bbox}&limit=1000`).then((r) => r.json())]);
        if (layers.draft) requests.push(['draft', fetch(`/api/zoning/draft.geojson?bbox=${bbox}&limit=1000`).then((r) => r.json())]);
        if (layers.parcels) requests.push(['parcels', fetch(`/api/parcels.geojson?bbox=${bbox}&limit=1500`).then((r) => r.json())]);
        const results = await Promise.all(requests.map(async ([key, promise]) => [key, await promise]));
        if (cancelled) return;

        if (currentLayerRef.current) currentLayerRef.current.remove();
        if (draftLayerRef.current) draftLayerRef.current.remove();
        if (parcelLayerRef.current) parcelLayerRef.current.remove();

        const counts = { current: 0, draft: 0, parcels: 0 };
        for (const [key, geojson] of results) {
          counts[key] = geojson.features?.length || 0;
          if (key === 'current') {
            currentLayerRef.current = L.geoJSON(geojson, {
              style: (feature) => polygonStyle(zoneColor(feature.properties?.zoneCode), 1, 0.28),
            }).addTo(map);
          }
          if (key === 'draft') {
            draftLayerRef.current = L.geoJSON(geojson, {
              style: (feature) => polygonStyle(zoneColor(feature.properties?.zoneCode), 1.4, 0.16),
            }).addTo(map);
          }
          if (key === 'parcels') {
            parcelLayerRef.current = L.geoJSON(geojson, {
              style: { color: 'rgba(26,22,18,0.35)', weight: 0.6, fillOpacity: 0 },
            }).addTo(map);
          }
        }
        if (selectedLayerRef.current) {
          selectedLayerRef.current.bringToFront();
        }
        onLayerCounts(counts);
        onStatus(`Loaded ${counts.current + counts.draft + counts.parcels} visible features.`);
      } catch (error) {
        if (!cancelled) {
          onStatus(error.message || 'Map layer loading failed.');
        }
      }
    }

    const scheduleLoad = () => {
      window.clearTimeout(timer);
      timer = window.setTimeout(loadViewport, 180);
    };
    scheduleLoad();
    map.on('moveend zoomend', scheduleLoad);
    return () => {
      cancelled = true;
      window.clearTimeout(timer);
      map.off('moveend zoomend', scheduleLoad);
    };
  }, [layers.current, layers.draft, layers.parcels]);

  return (
    <div className="map-canvas">
      <div id="map" aria-label="Selected parcel map"></div>
      <div className="search-overlay">
        <i data-lucide="search" style={{width:16, height:16}}></i>
        <input value={pid || ''} readOnly aria-label="Selected PID" />
      </div>
      <div className="legend">
        <h4>Zoning</h4>
        <div className="row"><span className="sw" style={{background:'var(--zone-residential)'}}></span><span>Residential</span></div>
        <div className="row"><span className="sw" style={{background:'var(--zone-commercial)'}}></span><span>Commercial</span></div>
        <div className="row"><span className="sw" style={{background:'var(--zone-mixed)'}}></span><span>Mixed use</span></div>
        <div className="row"><span className="sw" style={{background:'var(--zone-institutional)'}}></span><span>Institutional</span></div>
        <div className="row"><span className="sw" style={{background:'var(--zone-openspace)'}}></span><span>Open space</span></div>
      </div>
    </div>
  );
}

function SelectedParcel({ pid, parcel }) {
  if (!pid) {
    return <div className="status-card">No PID was supplied. Start from parcel lookup.</div>;
  }
  if (!parcel) {
    return <div className="status-card">Loading selected parcel.</div>;
  }
  const current = parcel.zones?.current;
  const draft = parcel.zones?.draft;
  return (
    <>
      <div className="selected-card">
        <h4 className="addr">{parcel.address?.label || 'Selected parcel'}</h4>
        <div className="pid">PID {parcel.pid} · {formatArea(parcel.parcel?.areaM2)}</div>
        <span className="zchip" style={{background: zoneColor(current?.code)}}>{current?.code || 'Current pending'}</span>
        <span className="zchip" style={{background: zoneColor(draft?.code)}}>{draft?.code || 'Draft pending'}</span>
        <div className="zone-line">Current: {current?.name || current?.code || 'pending'}</div>
        <div className="zone-line">Draft: {draft?.name || draft?.code || 'pending'}</div>
        <div className="mini-rules">
          <div className="k">Resolution</div><div className="v">{parcel.resolution?.status || 'pending'}</div>
          <div className="k">Current overlap</div><div className="v">{formatArea(current?.overlapAreaM2)}</div>
          <div className="k">Draft overlap</div><div className="v">{formatArea(draft?.overlapAreaM2)}</div>
          <div className="k">Parcel source</div><div className="v">{parcel.resolution?.method || 'pending'}</div>
        </div>
      </div>
      <div className="route-actions">
        <a className="btn btn-secondary" href="/parcel-lookup" style={{justifyContent:'center'}}>New lookup</a>
        <a className="btn btn-primary" href={`/zoning-comparison?pid=${encodeURIComponent(parcel.pid)}`} style={{justifyContent:'center'}}><i data-lucide="git-compare" style={{width:14, height:14}}></i> Compare to draft</a>
      </div>
    </>
  );
}

function App() {
  const params = new URLSearchParams(window.location.search);
  const pid = params.get('pid') || '';
  const [parcel, setParcel] = useState(null);
  const [status, setStatus] = useState(pid ? 'Loading selected parcel.' : 'No selected parcel.');
  const [counts, setCounts] = useState({ current: 0, draft: 0, parcels: 0 });
  const [layers, setLayers] = useState({ current: true, draft: true, parcels: true });

  useEffect(() => { lucide.createIcons(); });

  useEffect(() => {
    if (!pid) return;
    let cancelled = false;
    async function loadParcel() {
      try {
        const response = await fetch(`/api/parcels/${encodeURIComponent(pid)}`);
        if (!response.ok) {
          throw new Error(`Parcel lookup failed with HTTP ${response.status}.`);
        }
        const payload = await response.json();
        if (!cancelled) {
          setParcel(payload);
          setStatus(`Selected PID ${payload.pid}.`);
        }
      } catch (error) {
        if (!cancelled) {
          setStatus(error.message || 'Parcel lookup failed.');
        }
      }
    }
    loadParcel();
    return () => { cancelled = true; };
  }, [pid]);

  return (
    <div className="map-app">
      <Header />
      <div className="map-body">
        <aside className="map-panel">
          <h3 className="panel-title">Layers</h3>
          <LayerToggle checked={layers.current} color="var(--brick)" name="Current zoning" count={counts.current} onChange={(value)=>setLayers({...layers, current:value})} />
          <LayerToggle checked={layers.draft} color="var(--ochre)" name="Draft zoning" count={counts.draft} onChange={(value)=>setLayers({...layers, draft:value})} />
          <LayerToggle checked={layers.parcels} color="var(--paper-2)" name="Parcel outlines" count={counts.parcels} onChange={(value)=>setLayers({...layers, parcels:value})} />

          <h3 className="panel-title">Map status</h3>
          <div className="status-card">{status}</div>

          <h3 className="panel-title">Sources</h3>
          <div className="source-list">
            <div className="item"><div className="label">Parcel</div><div>{parcel?.source?.parcelTable || 'zoning.v_charlottetown_parcel_map'}</div></div>
            <div className="item"><div className="label">Current zoning</div><div>{parcel?.source?.currentZoningTable || 'zoning.v_charlottetown_current_zoning_boundaries'}</div></div>
            <div className="item"><div className="label">Draft zoning</div><div>{parcel?.source?.draftZoningTable || 'zoning.v_charlottetown_draft_zoning_boundaries'}</div></div>
          </div>
        </aside>
        <MapView pid={pid} parcel={parcel} layers={layers} onLayerCounts={setCounts} onStatus={setStatus} />
        <aside className="map-panel right">
          <h3 className="panel-title">Selected parcel</h3>
          <SelectedParcel pid={pid} parcel={parcel} />
        </aside>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body></html>
