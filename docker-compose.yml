name: mdopendata

services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: mdopendata-postgis
    restart: unless-stopped
    ports:
      - "${PGPORT:-54329}:5432"
    environment:
      POSTGRES_DB: "${PGDATABASE:-mdopendata}"
      POSTGRES_USER: "${PGUSER:-mdopendata}"
      POSTGRES_PASSWORD: "${PGPASSWORD:-mdopendata_dev}"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./schema/postgis.sql:/docker-entrypoint-initdb.d/001-postgis.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-mdopendata} -d ${PGDATABASE:-mdopendata}"]
      interval: 10s
      timeout: 5s
      retries: 10
