name: mdopendata

services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: mdopendata-postgis
    restart: unless-stopped
    ports:
      - "${PGPORT:-54329}:5432"
    environment:
      POSTGRES_DB: "${PGDATABASE:-mdopendata}"
      POSTGRES_USER: "${PGUSER:-mdopendata}"
      POSTGRES_PASSWORD: "${PGPASSWORD:-mdopendata_dev}"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./schema/sql/postgis.sql:/docker-entrypoint-initdb.d/001-postgis.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-mdopendata} -d ${PGDATABASE:-mdopendata}"]
      interval: 10s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: mdopendata-pgadmin
    restart: unless-stopped
    depends_on:
      postgis:
        condition: service_healthy
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_DEFAULT_EMAIL:-admin@mdopendata.local}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_DEFAULT_PASSWORD:-mdopendata_admin}"
    volumes:
      - ./data/pgadmin:/var/lib/pgadmin
